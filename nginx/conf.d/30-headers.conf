# /etc/nginx/conf.d/30-headers.conf

server_tokens off;
more_clear_headers Server;

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Frame-Options "DENY";
add_header X-Content-Type-Options "nosniff";
add_header Referrer-Policy "no-referrer";

# You may need to modify this header
# Refer to https://developer.mozilla.org/en-US/docs/Web/HTTP/Guides/CSP
# for more information
add_header Content-Security-Policy "frame-ancestors 'none'; default-src 'self'; img-src 'self';";

# This header prevents indexing,
# only enable it if you really want to
#add_header X-Robots-Tag "noindex";
